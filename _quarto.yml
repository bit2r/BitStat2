project:
  type: website
  output-dir: docs
  preview:
    port: 7771
    browser: false
  resources:
    - "images/*.png"
    - "images/*.jp*g"

lang: ko-KR

website:
  title: "빗스탯2"
  site-url: https://r2bit.com/BitStat2/
  google-analytics: "UA-229551680-1"
  description: "BitStat2: 오픈 통계 패키지"
  favicon: images/favicon.ico
  search: true
  navbar:
    logo: images/Korea_R_User_Group_kor.png
    left:
      - text: "빛스탯"
        menu:
        - href: 01_data.qmd
          text: "01 데이터"
        - href: 02_eda.qmd
          text: "02 EDA"
        - href: 03_viz.qmd
          text: "03 시각화"
        - href: 04_testing.qmd
          text: "04 통계검정"
        - href: 05_infer.qmd
          text: "05 추론"
        - href: 06_reg.qmd
          text: "06 회귀분석"
        - href: 07_theory.qmd
          text: "07 통계이론"
    right:
      - about.qmd
      - BitStat.qmd
      - icon: github
        href: https://github.com/bit2r/BitStat2
      - icon: facebook
        href: https://www.facebook.com/groups/tidyverse
      - icon: discord
        href: https://discord.gg/wJbu4WQz
format:
  html:
    theme: spacelab
    linkcolor: "#0000A0"
    css: styles.css
    highlight-style: github
    date-format: iso

editor: source
license: "CC BY-SA-NC & GPL-3"

number-sections: true
number-depth: 2

# ---------------------------------- #
filters:
  - shinylive
  - webr
  # - pyodide

# ---------------------------------- #
webr:
  packages:
  - "stringr"
  - "dplyr"
  - "ggplot2"
  - "tidyr"
  - "gt"
  - "gtExtras"
  - "tibble"
  - "readr"
  - "curl"
