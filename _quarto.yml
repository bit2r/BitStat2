project:
  type: website
  output-dir: docs
  preview:
    port: 7771
    browser: false
  # 포털은 단일 랜딩만 렌더한다. 콘텐츠 정본은 트랙 저장소에 있다:
  #   앱 트랙  → BitStat2-shiny  · 코드 트랙 → BitStat2-quarto
  render:
    - index.qmd
  resources:
    - "assets/*.png"
    - "assets/*.ico"

lang: ko-KR
engine: knitr

website:
  title: "빛스탯2"
  site-url: https://r2bit.com/BitStat2/
  description: "빛스탯2 — 만지며, 코딩하며 배우는 오픈 통계 플랫폼"
  favicon: assets/favicon.ico

format:
  html:
    theme: cosmo
    toc: false
    linkcolor: "#1d4ed8"

editor: source
# 대상별 라이선스 분리: 콘텐츠=CC BY-NC-SA 4.0 / 코드=GPL-3.0
# 상세: LICENSE(코드), documents/LICENSE-content.md(콘텐츠), documents/DATA_LICENSES.md(데이터)
