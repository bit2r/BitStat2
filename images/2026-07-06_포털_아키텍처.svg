  <line x1="320" y1="456" x2="320" y2="484" stroke="#d1d5db" stroke-width="1"/>
  <line x1="920" y1="456" x2="920" y2="484" stroke="#d1d5db" stroke-width="1"/>
  <line x1="320" y1="484" x2="920" y2="484" stroke="#d1d5db" stroke-width="1"/>
  <line x1="620" y1="484" x2="620" y2="508" stroke="#d1d5db" stroke-width="1"/>

  <rect x="150" y="508" width="940" height="120" rx="10" fill="none" stroke="#e5e7eb" stroke-width="1"/>
