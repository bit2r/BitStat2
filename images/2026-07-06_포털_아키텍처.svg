  <g font-size="10" fill="#6b7280" text-anchor="middle">
    <text x="240" y="566">01 데이터</text>
    <text x="240" y="582" fill="#9ca3af">4 토픽</text>
    <text x="367" y="566">02 EDA</text>
    <text x="367" y="582" fill="#9ca3af">4 토픽</text>
    <text x="494" y="566">03 시각화</text>
    <text x="494" y="582" fill="#9ca3af">2 토픽</text>
    <text x="620" y="566">04 통계 검정</text>
    <text x="620" y="582" fill="#9ca3af">5 토픽</text>
    <text x="747" y="566">05 추론</text>
    <text x="747" y="582" fill="#9ca3af">2 토픽</text>
    <text x="874" y="566">06 회귀분석</text>
    <text x="874" y="582" fill="#9ca3af">2 토픽</text>
    <text x="1000" y="566">07 통계이론</text>
    <text x="1000" y="582" fill="#9ca3af">4 토픽</text>
  </g>
  <text x="620" y="612" font-size="9.5" fill="#9ca3af" text-anchor="middle">계 23개 토픽 — 앱(체험)과 코드(실습)가 1:1 대응</text>

  <!-- ===== 주석 ===== -->
  <g font-size="10" fill="#6b7280" font-style="italic">
    <text x="40" y="130">중복 제거(2026-07-06) —</text>
    <text x="40" y="143">포털 저장소에서 pages/ ·</text>
    <text x="40" y="156">live/ · _extensions ·</text>
    <text x="40" y="169">data/ · _freeze/ 제거.</text>
    <text x="40" y="182">콘텐츠 정본은 각 트랙</text>
    <text x="40" y="195">저장소 하나씩만 유지.</text>

    <text x="960" y="130">배포 전환 순서 —</text>
    <text x="960" y="143">① BitStat2-shiny 배포</text>
    <text x="960" y="156">② 포털(portal 브랜치)을</text>
    <text x="960" y="169">&#160;&#160;&#160;gh-pages로 전환</text>
    <text x="960" y="182">③ 링크·리다이렉트 점검</text>
    <text x="960" y="195">순서를 지켜야 무중단.</text>
  </g>

  <!-- ===== 푸터: 원칙 ===== -->
  <line x1="40" y1="700" x2="1200" y2="700" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="724" font-size="10.5" fill="#6b7280">원칙 — 정본은 저장소당 하나(포털=조율·문서, 트랙=콘텐츠) · 포털은 콘텐츠를 갖지 않는다(렌더 1페이지) · 트랙 간 이동은 포털 경유가 아닌 직접 링크(짝 사이트 상호 링크)</text>
  <text x="40" y="742" font-size="10.5" fill="#6b7280">구현 — index.qmd 원 HTML + assets/portal.css(.bs- 디자인 시스템, quarto 홈과 동일 계열) · 기술문서: documents/tech_document/2026-07-06_포털_전환.md(로컬) · 이 다이어그램: images/2026-07-06_포털_아키텍처.svg</text>
