  <line x1="40" y1="76" x2="1200" y2="76" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== 포털 (상단 중앙) ===== -->
  <rect x="420" y="100" width="400" height="120" rx="10" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <text x="620" y="128" font-size="10" fill="#2563eb" text-anchor="middle" letter-spacing="2" font-weight="bold">PORTAL · bit2r/BitStat2</text>
  <text x="620" y="152" font-size="16" fill="#111827" text-anchor="middle" font-weight="bold">빛스탯2 포털 — r2bit.com/BitStat2</text>
  <text x="620" y="174" font-size="10.5" fill="#6b7280" text-anchor="middle">단일 랜딩(index.qmd) · 트랙 안내 · 공통 커리큘럼 지도</text>
  <text x="620" y="192" font-size="10.5" fill="#6b7280" text-anchor="middle">정본: 커리큘럼 설계 · 공통 문서(documents/) · 라이선스</text>
  <text x="620" y="210" font-size="9" fill="#9ca3af" text-anchor="middle">렌더 대상 = index.qmd 하나 (콘텐츠 없음)</text>

  <!-- 분기선 -->
  <line x1="620" y1="220" x2="620" y2="248" stroke="#d1d5db" stroke-width="1"/>
  <line x1="320" y1="248" x2="920" y2="248" stroke="#d1d5db" stroke-width="1"/>
  <line x1="320" y1="248" x2="320" y2="276" stroke="#d1d5db" stroke-width="1"/>
  <line x1="920" y1="248" x2="920" y2="276" stroke="#d1d5db" stroke-width="1"/>

