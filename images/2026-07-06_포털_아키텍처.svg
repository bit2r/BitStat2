  <rect x="690" y="276" width="460" height="180" rx="10" fill="none" stroke="#9ca3af" stroke-width="1"/>
  <text x="710" y="304" font-size="10" fill="#2563eb" letter-spacing="1.5" font-weight="bold">코드 트랙 · bit2r/BitStat2-quarto</text>
  <text x="710" y="330" font-size="15" fill="#111827" font-weight="bold">BitStat2 Live — 코딩하며 원리</text>
  <text x="710" y="352" font-size="10.5" fill="#6b7280">편집형 R 셀 · OJS 반응형(input:/define:) · 자동 채점 43문항</text>
  <text x="710" y="370" font-size="10.5" fill="#6b7280">스택: Quarto Live × webR 0.6.0</text>
  <text x="710" y="394" font-size="10.5" fill="#111827">주소: r2bit.com/BitStat2-quarto</text>
  <text x="710" y="412" font-size="9.5" fill="#2563eb" font-weight="bold">상태: 라이브 — 23/23 토픽 전부 실습 가능</text>
  <text x="710" y="438" font-size="9" fill="#9ca3af">이관: live/ 전체 (git filter-repo로 이력째 분리, 2026-07-06)</text>

