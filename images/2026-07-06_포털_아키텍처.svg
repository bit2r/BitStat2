  <text x="110" y="370" font-size="10.5" fill="#6b7280">스택: Shiny × shinylive × webR (서버리스)</text>
  <text x="110" y="394" font-size="10.5" fill="#111827">예정 주소: r2bit.com/BitStat2-shiny</text>
  <text x="110" y="412" font-size="9.5" fill="#92400e">상태: 배포 전환 준비 중 — 전환 전까지 기존 r2bit.com/BitStat2 경로에서 서비스</text>
  <text x="110" y="438" font-size="9" fill="#9ca3af">이관: pages/(모듈 63파일) · _extensions(shinylive) · data/ · _freeze/</text>

