<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 780" font-family="Georgia, 'Apple SD Gothic Neo', 'Noto Serif KR', serif">
  <!-- Tufte-style: 잉크 최소 · 헤어라인 · 단일 액센트(#2563EB) · 직접 라벨 -->
  <!-- 2026-07-06: BitStat2 모노레포 → 포털 + 2 트랙 저장소 전환 -->
  <rect width="1240" height="780" fill="#ffffff"/>

