<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="'ET Book','Palatino Linotype',Palatino,Georgia,'Times New Roman',serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#555" stroke-width="1"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#9c2a10" stroke-width="1"/>
    </marker>
    <style>
      text{fill:#1a1a1a}
      .t{font-size:25px}
      .sub{font-size:13px;fill:#6b6b60;font-style:italic}
      .layer{font-size:12.5px;fill:#8a8578;font-style:italic;letter-spacing:.12em}
      .h{font-size:15px;fill:#141410}
      .b{font-size:12.5px;fill:#35352c}
      .s{font-size:11px;fill:#6b6b60}
      .note{font-size:11.5px;fill:#9c2a10;font-style:italic}
      .box{fill:#f5f3e6;stroke:#3a3a32;stroke-width:1}
      .box2{fill:#ffffff;stroke:#3a3a32;stroke-width:1}
      .ext{fill:#efece0;stroke:#8a8578;stroke-width:1}
      .browser{fill:#fbfaf2;stroke:#3a3a32;stroke-width:1.2}
      .flow{stroke:#555;stroke-width:1.2;fill:none}
      .fetch{stroke:#9c2a10;stroke-width:1;fill:none;stroke-dasharray:3 3}
      .rule{stroke:#d8d4c2;stroke-width:1}
    </style>
  </defs>

  <rect x="0" y="0" width="1080" height="720" fill="#fffff8"/>

  <text class="t" x="40" y="46">빛스탯2 &#8212; 아키텍처</text>
  <text class="sub" x="318" y="46">Architecture &#183; 2026-07-05 기준</text>
  <line class="rule" x1="40" y1="58" x2="1040" y2="58"/>

  <!-- ============ Layer 1 : SOURCE ============ -->
  <text class="layer" x="40" y="82">소 스   ·   S O U R C E</text>
  <rect class="box" x="40" y="92" width="312" height="120" rx="2"/>
  <text class="h" x="54" y="114">index.qmd</text>
  <text class="s" x="54" y="132" font-style="italic">모듈별 콘텐츠 &#183; 단일 정본</text>
  <text class="b" x="54" y="154">&#183; 본문 (Quarto markdown)</text>
  <text class="b" x="54" y="174">&#183; {shinylive-r} &#8212; 배포 정본 앱</text>
  <text class="b" x="54" y="194">&#183; {webr-r} &#8212; 실행 코드셀</text>

  <rect class="box2" x="372" y="92" width="184" height="56" rx="2"/>
  <text class="h" x="386" y="114">_quarto.yml</text>
  <text class="s" x="386" y="134">engine:knitr &#183; filters &#183; freeze</text>

  <rect class="box2" x="372" y="156" width="184" height="56" rx="2"/>
  <text class="h" x="386" y="178">_extensions/</text>
  <text class="s" x="386" y="198">shinylive.lua &#183; webr</text>

  <rect class="box2" x="576" y="92" width="194" height="56" rx="2"/>
  <text class="h" x="590" y="114">data/</text>
  <text class="s" x="590" y="134">Galton &#183; k_penguins</text>

  <rect class="box2" x="576" y="156" width="194" height="56" rx="2"/>
  <text class="h" x="590" y="176">컨벤션</text>
  <text class="s" x="590" y="196">showtext_auto() &#183; YAML 메타</text>

  <path class="flow" d="M196,212 L196,244" marker-end="url(#arr)"/>

  <!-- ============ Layer 2 : BUILD ============ -->
  <text class="layer" x="40" y="238">빌 드   ·   B U I L D</text>
  <rect class="box" x="40" y="248" width="330" height="66" rx="2"/>
  <text class="h" x="54" y="272">Quarto render</text>
  <text class="s" x="54" y="292">knitr 엔진 &#183; 필터 shinylive·webr</text>
  <text class="s" x="54" y="308">freeze 캐시 (_freeze/)</text>

  <path class="flow" d="M370,281 L426,281" marker-end="url(#arr)"/>

  <rect class="box" x="428" y="248" width="342" height="66" rx="2"/>
  <text class="h" x="442" y="272">docs/  &#8212; 정적 산출물</text>
  <text class="s" x="442" y="292">HTML + site_libs</text>
  <text class="s" x="442" y="308">shinylive 0.2.3 자산 (배포 버전)</text>

  <path class="flow" d="M200,314 L200,352" marker-end="url(#arr)"/>

  <!-- ============ Layer 3 : DELIVERY ============ -->
  <text class="layer" x="40" y="346">배 포   ·   D E L I V E R Y</text>
  <rect class="box2" x="40" y="356" width="214" height="46" rx="2"/>
  <text class="h" x="54" y="384">GitHub &#183; bit2r/BitStat2</text>
  <path class="flow" d="M254,379 L302,379" marker-end="url(#arr)"/>
  <rect class="box2" x="304" y="356" width="150" height="46" rx="2"/>
  <text class="h" x="318" y="384">GitHub Pages</text>
  <path class="flow" d="M454,379 L502,379" marker-end="url(#arr)"/>
  <rect class="box2" x="504" y="356" width="266" height="46" rx="2"/>
  <text class="h" x="518" y="384">r2bit.com/BitStat2</text>

  <path class="flow" d="M400,402 L400,440" marker-end="url(#arr)"/>
  <text class="s" x="408" y="428">HTTPS GET (정적)</text>

  <!-- ============ Layer 4 : CLIENT RUNTIME ============ -->
  <text class="layer" x="40" y="464">클라이언트 런타임   ·   브라우저 / WEBASSEMBLY</text>
  <rect class="browser" x="40" y="474" width="730" height="176" rx="3"/>
  <text class="s" x="56" y="494" font-style="italic">사용자 브라우저 &#8212; 서버 없이 앱 실행</text>

  <rect class="box" x="60" y="506" width="316" height="124" rx="2"/>
  <text class="h" x="74" y="530">Shinylive 앱 (iframe)</text>
  <text class="b" x="74" y="552">webR + Shiny 를 브라우저에서 실행</text>
  <text class="s" x="74" y="574">R 4.4.1 (WASM) &#183; 상태 없음</text>
  <text class="s" x="74" y="594">패키지: 가상 FS에 설치</text>
  <text class="s" x="74" y="614">munsell/ggplot2 &#8212; 0.2.3에서 정상</text>

  <rect class="box2" x="392" y="506" width="360" height="56" rx="2"/>
  <text class="h" x="406" y="528">webr 코드셀</text>
  <text class="s" x="406" y="548">"Run Code" 시 R 실행 · 그림·표 출력</text>

  <rect class="box2" x="392" y="574" width="360" height="56" rx="2"/>
  <text class="h" x="406" y="596">보조 프런트엔드</text>
  <text class="s" x="406" y="616">MathJax 3 (수식) · Monaco (코드 편집)</text>

  <!-- ============ External services column ============ -->
  <line class="rule" x1="798" y1="70" x2="798" y2="662"/>
  <text class="layer" x="812" y="238">외 부 서 비 스   ·   런 타 임   F E T C H</text>

  <rect class="ext" x="812" y="250" width="230" height="60" rx="2"/>
  <text class="h" x="824" y="274">repo.r-wasm.org</text>
  <text class="s" x="824" y="296">WASM 패키지 바이너리</text>

  <rect class="ext" x="812" y="322" width="230" height="60" rx="2"/>
  <text class="h" x="824" y="346">webr.r-wasm.org</text>
  <text class="s" x="824" y="368">webR 런타임 v0.3.3</text>

  <rect class="ext" x="812" y="394" width="230" height="60" rx="2"/>
  <text class="h" x="824" y="418">cdn.jsdelivr.net</text>
  <text class="s" x="824" y="440">MathJax 3 · Monaco 0.47</text>

  <rect x="812" y="470" width="230" height="66" rx="2" fill="#fbecea" stroke="#9c2a10" stroke-width="1"/>
  <text x="824" y="492" font-size="13.5px" fill="#9c2a10" text-decoration="line-through">polyfill.io</text>
  <text class="note" x="824" y="512">제거됨 &#8212; 공급망 공격</text>
  <text class="note" x="824" y="528">(악성 스크립트 주입 CDN)</text>

  <!-- fetch arrows browser -> external -->
  <path class="fetch" d="M754,540 C784,520 786,300 810,290" marker-end="url(#arrR)"/>
  <path class="fetch" d="M754,548 C790,540 792,372 810,360" marker-end="url(#arrR)"/>
  <path class="fetch" d="M754,600 C792,600 794,440 810,432" marker-end="url(#arrR)"/>

  <!-- margin notes -->
  <line class="rule" x1="40" y1="676" x2="1040" y2="676"/>
  <text class="note" x="40" y="696">서버 없음(serverless) &#8212; GitHub Pages 정적 호스팅만으로 인터랙티브 통계 앱 제공.</text>
  <text class="note" x="40" y="712">정본 = index.qmd 인라인 블록(개발용 shiny/ 사본 제거). 재렌더 시 shinylive 자산이 0.9.1로 바뀌면 앱 깨짐 &#8594; 버전 고정 필요.</text>
</svg>
