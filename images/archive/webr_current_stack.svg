<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700" font-family="'ET Book','Palatino Linotype',Palatino,Georgia,'Times New Roman',serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#555" stroke-width="1"/></marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#9c2a10" stroke-width="1"/></marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#3f6b3f" stroke-width="1"/></marker>
    <style>
      text{fill:#1a1a1a}
      .t{font-size:25px}.sub{font-size:13px;fill:#6b6b60;font-style:italic}
      .lab{font-size:12.5px;fill:#8a8578;font-style:italic;letter-spacing:.1em}
      .h{font-size:15px;fill:#141410}.b{font-size:12px;fill:#35352c}.s{font-size:11px;fill:#6b6b60}
      .v{font-size:15px;fill:#8a1500;font-weight:bold}
      .note{font-size:11.5px;fill:#9c2a10;font-style:italic}.ok{font-size:11.5px;fill:#3f6b3f;font-style:italic}
      .box{fill:#f5f3e6;stroke:#3a3a32;stroke-width:1}.box2{fill:#ffffff;stroke:#3a3a32;stroke-width:1}
      .good{fill:#eef3ea;stroke:#3f6b3f;stroke-width:1}.local{fill:#eef3ea;stroke:#3f6b3f;stroke-width:1}
      .flow{stroke:#555;stroke-width:1.2;fill:none}.fetch{stroke:#9c2a10;stroke-width:1;fill:none;stroke-dasharray:3 3}
      .rule{stroke:#d8d4c2;stroke-width:1}
    </style>
  </defs>
  <rect x="0" y="0" width="1080" height="700" fill="#fffff8"/>
  <text class="t" x="40" y="46">빛스탯2 webR 스택 — 정렬 완료</text>
  <text class="sub" x="415" y="46">webR 0.6.0 정렬 · 2026-07-05</text>
  <line class="rule" x1="40" y1="58" x2="1040" y2="58"/>

  <text class="lab" x="40" y="86">한 페 이 지 에 webR 인 스 턴 스 가 둘   —   이 제 둘 다 0.6.0</text>

  <!-- ① 코드셀 -->
  <rect class="box" x="40" y="100" width="490" height="150" rx="3"/>
  <text class="h" x="56" y="124">① {webr-r} 코드셀  —  "WEBR STATUS"</text>
  <text class="s" x="56" y="144" font-style="italic">확장: coatless/webr (quarto-webr)</text>
  <text class="b" x="56" y="168">webR 런타임</text>
  <text class="v" x="180" y="168">v0.6.0 · R 4.6</text>
  <text class="s" x="56" y="188">baseVersionWebR = "0.6.0" (0.3.3에서 갱신)</text>
  <path class="fetch" d="M270,196 L270,214" marker-end="url(#arrR)"/>
  <text class="note" x="278" y="210">패키지 원격 설치(번들 없음)</text>
  <rect x="56" y="216" width="458" height="26" rx="2" fill="#fbecea" stroke="#9c2a10" stroke-width="1"/>
  <text class="s" x="66" y="234" fill="#9c2a10">repo.r-wasm.org/…/contrib/4.6 — 셀당 소수 패키지 다운로드</text>

  <!-- ② 앱 -->
  <rect class="box" x="550" y="100" width="490" height="150" rx="3"/>
  <text class="h" x="566" y="124">② {shinylive-r} 인터랙티브 앱</text>
  <text class="s" x="566" y="144" font-style="italic">확장: quarto-ext/shinylive + 자산</text>
  <text class="b" x="566" y="168">자산 shinylive-0.10.12 · webR</text>
  <text class="v" x="828" y="168">0.6.0 · R 4.6</text>
  <text class="s" x="566" y="188">_environment: SHINYLIVE_ASSETS_VERSION=0.10.12</text>
  <path class="flow" d="M780,196 L780,214" marker-end="url(#arrG)"/>
  <text class="ok" x="788" y="210">로컬 번들에서 로드</text>
  <rect x="566" y="216" width="458" height="26" rx="2" fill="#eef3ea" stroke="#3f6b3f" stroke-width="1"/>
  <text class="s" x="576" y="234" fill="#3f6b3f">site_libs/…/shinylive-0.10.12/…/packages/*.tgz — 106개 번들(원격 0)</text>

  <!-- 측정 속도 -->
  <text class="lab" x="40" y="286">측 정 (콜드 스타트, 실측)</text>
  <rect class="good" x="40" y="298" width="320" height="74" rx="2"/>
  <text class="h" x="54" y="322">② 앱 (번들링)</text>
  <text class="v" x="54" y="350" font-size="20">~18–25초</text>
  <text class="s" x="54" y="366">이전 legacy 대비 ~2.5–3배 빠름</text>

  <rect class="box2" x="376" y="298" width="320" height="74" rx="2"/>
  <text class="h" x="390" y="322">① 코드셀 (원격 설치)</text>
  <text class="v" x="390" y="350" font-size="20">~40–50초</text>
  <text class="s" x="390" y="366">webR 0.6.0(.tgz·async)로 소폭 개선</text>

  <rect class="box2" x="712" y="298" width="328" height="74" rx="2"/>
  <text class="h" x="726" y="322">재방문</text>
  <text class="v" x="726" y="350" font-size="20">~5–10초</text>
  <text class="s" x="726" y="366">브라우저 캐시</text>

  <!-- 요약 -->
  <line class="rule" x1="40" y1="398" x2="1040" y2="398"/>
  <text class="h" x="40" y="424">핵심: "WEBR STATUS"(①코드셀)와 앱(②)은 <tspan fill="#9c2a10">서로 다른 webR</tspan> 이다 — 진단 시 반드시 분리.</text>
  <text class="b" x="40" y="446">이제 <tspan font-style="italic">둘 다 webR 0.6.0(R 4.6)</tspan> 로 정렬. 앱은 번들(로컬)로 빠르고, 코드셀은 원격 설치라 상대적으로 느리다(번들 대상 아님).</text>
  <text class="b" x="40" y="468">앱 번들 정렬 조건: 확장·shinylive R 0.5.0·자산 0.10.12·webR 0.6.0 이 <tspan font-style="italic">모두 R 4.6로 일치</tspan> 해야 로컬 번들이 실제로 쓰인다.</text>

  <text class="s" x="40" y="502">산출물: docs/ ≈ 173 MB(번들 site_libs 162M, 파일별 &lt;100MB). 통신: PostMessage(COI 없음 → SharedArrayBuffer 미사용).</text>

  <line class="rule" x1="40" y1="524" x2="1040" y2="524"/>
  <text class="lab" x="40" y="550">더 빠르게 (확장 무관, 다음 단계)</text>
  <text class="b" x="56" y="574">· 코드셀 의존성 슬림화(무거운 패키지 줄이기) — 원격 설치 시간 직접 단축</text>
  <text class="b" x="56" y="596">· coi-serviceworker 로 Cross-Origin Isolation → SharedArrayBuffer 채널(더 빠른 통신)</text>
  <text class="b" x="56" y="618">· webr.packages 목록을 실제 사용 패키지로 정리(불필요 프리로드 제거)</text>
  <line class="rule" x1="40" y1="642" x2="1040" y2="642"/>
  <text class="ok" x="40" y="664">2026-07-05: 코드셀 0.3.3→0.6.0, 앱 0.2.3→0.10.12(번들) 적용·배포. 두 webR 정렬 완료.</text>
</svg>
