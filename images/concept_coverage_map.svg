<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 812" font-family="'ET Book','Palatino Linotype',Palatino,Georgia,'Times New Roman',serif">
  <defs>
    <style>
      text{fill:#1a1a1a}
      .t{font-size:25px}.sub{font-size:13px;fill:#6b6b60;font-style:italic}
      .col{font-size:11px;fill:#8a8578;font-style:italic;letter-spacing:.12em}
      .stage{font-size:14px;fill:#141410}
      .have{font-size:12.5px;fill:#6b6b60;font-style:italic}
      .none{font-size:12px;fill:#9c2a10;font-style:italic}
      .gaptext{font-size:12.5px;fill:#7a2515}
      .note{font-size:10.5px;fill:#9a9488;font-style:italic}
      .rule{stroke:#d8d4c2;stroke-width:1}.row{stroke:#ece9d8;stroke-width:1}
      .gapbox{fill:#fdf0ee;stroke:#9c2a10;stroke-width:1.1}
      .sumbox{fill:#f5f3e6;stroke:#3a3a32;stroke-width:1}
      .badgeP0{fill:#9c2a10}.badgeP1{fill:#b5761f}.badgeP2{fill:#8a8578}
      .badgetext{font-size:9.5px;fill:#fff;font-weight:bold}
      .lg{font-size:11.5px;fill:#35352c}
    </style>
  </defs>
  <rect x="0" y="0" width="1120" height="812" fill="#fffff8"/>

  <text class="t" x="40" y="46">통계 개념 커버리지 지도 — 있는 것과 빠진 것</text>
  <text class="sub" x="590" y="46">23개 인터랙티브 모듈을 표준 커리큘럼에 대조</text>
  <line class="rule" x1="40" y1="58" x2="1080" y2="58"/>

  <!-- column headers -->
  <text class="col" x="40" y="80">학 습 단 계  (데이터 → 확률 → 분포 → 추론 → 검정 → 회귀)</text>
  <text class="col" x="250" y="80">보 유  모 듈</text>
  <text class="col" x="690" y="80">빠 진  주 제  →  제 안  ·  우 선 순 위</text>
  <line class="rule" x1="40" y1="88" x2="1080" y2="88"/>

  <!-- ============ ROWS (top=96, h=50) ============ -->

  <!-- r1 데이터·측정 ◑ -->
  <circle cx="47" cy="121" r="5" fill="#fffff8" stroke="#b5761f" stroke-width="1.4"/>
  <path d="M47,116 A5,5 0 0,0 47,126 Z" fill="#b5761f"/>
  <text class="stage" x="60" y="126">데이터·측정</text>
  <text class="have" x="250" y="126">기술통계 (EDA)</text>
  <g>
    <rect class="gapbox" x="690" y="108" width="200" height="26" rx="2"/>
    <rect class="badgeP1" x="690" y="108" width="24" height="26"/>
    <text class="badgetext" x="702" y="125" text-anchor="middle">P1</text>
    <text class="gaptext" x="720" y="125">⑦ 데이터 종류·측정척도</text>
  </g>

  <!-- r2 확률 기초 ❌ -->
  <line class="row" x1="40" y1="146" x2="1080" y2="146"/>
  <circle cx="47" cy="171" r="5" fill="none" stroke="#9c2a10" stroke-width="1.4"/>
  <text class="stage" x="60" y="176">확률 기초</text>
  <text class="none" x="250" y="176">— 전용 모듈 없음</text>
  <g>
    <rect class="gapbox" x="690" y="158" width="220" height="26" rx="2"/>
    <rect class="badgeP0" x="690" y="158" width="24" height="26"/>
    <text class="badgetext" x="702" y="175" text-anchor="middle">P0</text>
    <text class="gaptext" x="720" y="175">① 확률 규칙·조건부·베이즈 정리</text>
  </g>

  <!-- r3 확률분포 ✅ -->
  <line class="row" x1="40" y1="196" x2="1080" y2="196"/>
  <circle cx="47" cy="221" r="5" fill="#3f6b3f"/>
  <text class="stage" x="60" y="226">확률분포</text>
  <text class="have" x="250" y="226">연속형·이산형 분포 · 분포 적합</text>

  <!-- r4 표집·표집분포 ✅ -->
  <line class="row" x1="40" y1="246" x2="1080" y2="246"/>
  <circle cx="47" cy="271" r="5" fill="#3f6b3f"/>
  <text class="stage" x="60" y="276">표집·표집분포</text>
  <text class="have" x="250" y="276">표본추출 · 중심극한정리 · 대수의 법칙</text>

  <!-- r5 추정 ◑ -->
  <line class="row" x1="40" y1="296" x2="1080" y2="296"/>
  <circle cx="47" cy="321" r="5" fill="#fffff8" stroke="#b5761f" stroke-width="1.4"/>
  <path d="M47,316 A5,5 0 0,0 47,326 Z" fill="#b5761f"/>
  <text class="stage" x="60" y="326">추정</text>
  <text class="have" x="250" y="326">최대우도추정 · 신뢰구간</text>
  <g>
    <rect class="gapbox" x="690" y="308" width="190" height="26" rx="2"/>
    <rect class="badgeP1" x="690" y="308" width="24" height="26"/>
    <text class="badgetext" x="702" y="325" text-anchor="middle">P1</text>
    <text class="gaptext" x="720" y="325">⑥ 부트스트랩·재표집</text>
  </g>

  <!-- r6 검정의 논리 ❌ -->
  <line class="row" x1="40" y1="346" x2="1080" y2="346"/>
  <circle cx="47" cy="371" r="5" fill="none" stroke="#9c2a10" stroke-width="1.4"/>
  <text class="stage" x="60" y="376">검정의 논리</text>
  <text class="none" x="250" y="376">— 개념 앵커 없음</text>
  <g>
    <rect class="gapbox" x="690" y="358" width="160" height="26" rx="2"/>
    <rect class="badgeP0" x="690" y="358" width="24" height="26"/>
    <text class="badgetext" x="702" y="375" text-anchor="middle">P0</text>
    <text class="gaptext" x="720" y="375">② 가설검정의 논리</text>
    <text class="note" x="858" y="375">p값 · 1·2종 오류 · 검정력</text>
  </g>

  <!-- r7 평균 검정 ◑ -->
  <line class="row" x1="40" y1="396" x2="1080" y2="396"/>
  <circle cx="47" cy="421" r="5" fill="#fffff8" stroke="#b5761f" stroke-width="1.4"/>
  <path d="M47,416 A5,5 0 0,0 47,426 Z" fill="#b5761f"/>
  <text class="stage" x="60" y="426">평균 검정</text>
  <text class="have" x="250" y="426">단일평균 · 이표본 평균차 (t·z)</text>
  <g>
    <rect class="gapbox" x="690" y="408" width="185" height="26" rx="2"/>
    <rect class="badgeP0" x="690" y="408" width="24" height="26"/>
    <text class="badgetext" x="702" y="425" text-anchor="middle">P0</text>
    <text class="gaptext" x="720" y="425">③ 분산분석 (ANOVA)</text>
    <text class="note" x="883" y="425">3집단 이상</text>
  </g>

  <!-- r8 범주형 검정 ◑ -->
  <line class="row" x1="40" y1="446" x2="1080" y2="446"/>
  <circle cx="47" cy="471" r="5" fill="#fffff8" stroke="#b5761f" stroke-width="1.4"/>
  <path d="M47,466 A5,5 0 0,0 47,476 Z" fill="#b5761f"/>
  <text class="stage" x="60" y="476">범주형 검정</text>
  <text class="have" x="250" y="476">단일비율 · 2-비율 · 점수→확률</text>
  <g>
    <rect class="gapbox" x="690" y="458" width="165" height="26" rx="2"/>
    <rect class="badgeP0" x="690" y="458" width="24" height="26"/>
    <text class="badgetext" x="702" y="475" text-anchor="middle">P0</text>
    <text class="gaptext" x="720" y="475">④ 카이제곱 검정</text>
    <text class="note" x="863" y="475">적합도 · 독립성(교차표)</text>
  </g>

  <!-- r9 관계·회귀 ◑ -->
  <line class="row" x1="40" y1="496" x2="1080" y2="496"/>
  <circle cx="47" cy="521" r="5" fill="#fffff8" stroke="#b5761f" stroke-width="1.4"/>
  <path d="M47,516 A5,5 0 0,0 47,526 Z" fill="#b5761f"/>
  <text class="stage" x="60" y="526">관계·회귀</text>
  <text class="have" x="250" y="526">상관분석 · 단순 회귀</text>
  <g>
    <rect class="gapbox" x="690" y="508" width="130" height="26" rx="2"/>
    <rect class="badgeP1" x="690" y="508" width="24" height="26"/>
    <text class="badgetext" x="702" y="525" text-anchor="middle">P1</text>
    <text class="gaptext" x="720" y="525">⑤ 다중회귀</text>
    <rect class="gapbox" x="832" y="508" width="165" height="26" rx="2"/>
    <rect class="badgeP1" x="832" y="508" width="24" height="26"/>
    <text class="badgetext" x="844" y="525" text-anchor="middle">P1</text>
    <text class="gaptext" x="862" y="525">⑧ 로지스틱 회귀</text>
  </g>

  <!-- r10 비모수 검정 ❌ -->
  <line class="row" x1="40" y1="546" x2="1080" y2="546"/>
  <circle cx="47" cy="571" r="5" fill="none" stroke="#9c2a10" stroke-width="1.4"/>
  <text class="stage" x="60" y="576">비모수 검정</text>
  <text class="none" x="250" y="576">— 없음</text>
  <g>
    <rect class="gapbox" x="690" y="558" width="160" height="26" rx="2"/>
    <rect class="badgeP2" x="690" y="558" width="24" height="26"/>
    <text class="badgetext" x="702" y="575" text-anchor="middle">P2</text>
    <text class="gaptext" x="720" y="575">⑩ 비모수 검정</text>
    <text class="note" x="858" y="575">Wilcoxon · Kruskal-Wallis</text>
  </g>

  <!-- r11 다변량·ML ✅ -->
  <line class="row" x1="40" y1="596" x2="1080" y2="596"/>
  <circle cx="47" cy="621" r="5" fill="#3f6b3f"/>
  <text class="stage" x="60" y="626">다변량·ML</text>
  <text class="have" x="250" y="626">군집분석 (K-평균) · PCA</text>

  <!-- r12 베이즈·설계 ❌ -->
  <line class="row" x1="40" y1="646" x2="1080" y2="646"/>
  <circle cx="47" cy="671" r="5" fill="none" stroke="#9c2a10" stroke-width="1.4"/>
  <text class="stage" x="60" y="676">베이즈·설계</text>
  <text class="none" x="250" y="676">— 없음</text>
  <g>
    <rect class="gapbox" x="690" y="658" width="145" height="26" rx="2"/>
    <rect class="badgeP2" x="690" y="658" width="24" height="26"/>
    <text class="badgetext" x="702" y="675" text-anchor="middle">P2</text>
    <text class="gaptext" x="720" y="675">⑨ 베이즈 추론</text>
    <rect class="gapbox" x="847" y="658" width="165" height="26" rx="2"/>
    <rect class="badgeP2" x="847" y="658" width="24" height="26"/>
    <text class="badgetext" x="859" y="675" text-anchor="middle">P2</text>
    <text class="gaptext" x="877" y="675">⑪ 실험설계·인과</text>
  </g>

  <line class="rule" x1="40" y1="696" x2="1080" y2="696"/>

  <!-- summary band -->
  <rect class="sumbox" x="40" y="712" width="1040" height="52" rx="2"/>
  <text x="56" y="732" font-size="13" fill="#141410"><tspan font-style="italic" fill="#8a1500">비어 있는 4개 축 —</tspan> 분포·기술통계·기본검정·단순회귀는 탄탄하나, 아래 넷이 학습 흐름을 끊는다:</text>
  <text x="56" y="752" font-size="12.5" fill="#35352c">① 확률·베이즈 토대  ·  ② 가설검정의 논리  ·  ③④ 다집단·범주형 검정(ANOVA·카이제곱)  ·  ⑤⑧ 회귀 확장(다중·로지스틱)  →  <tspan font-style="italic" fill="#3f6b3f">넷 다 shinylive/webr로 구현 적합</tspan></text>

  <!-- legend -->
  <circle cx="48" cy="789" r="5" fill="#3f6b3f"/><text class="lg" x="58" y="793">보유</text>
  <circle cx="118" cy="789" r="5" fill="#fffff8" stroke="#b5761f" stroke-width="1.4"/><path d="M118,784 A5,5 0 0,0 118,794 Z" fill="#b5761f"/><text class="lg" x="128" y="793">부분</text>
  <circle cx="188" cy="789" r="5" fill="none" stroke="#9c2a10" stroke-width="1.4"/><text class="lg" x="198" y="793">없음</text>
  <rect class="badgeP0" x="300" y="782" width="22" height="15" rx="1"/><text class="badgetext" x="311" y="793" text-anchor="middle">P0</text><text class="lg" x="328" y="793">핵심 결손</text>
  <rect class="badgeP1" x="430" y="782" width="22" height="15" rx="1"/><text class="badgetext" x="441" y="793" text-anchor="middle">P1</text><text class="lg" x="458" y="793">중요 확장</text>
  <rect class="badgeP2" x="560" y="782" width="22" height="15" rx="1"/><text class="badgetext" x="571" y="793" text-anchor="middle">P2</text><text class="lg" x="588" y="793">심화</text>
  <text class="note" x="880" y="793">빛스탯2 · 2026-07-05 · 개념 커버리지 갭 분석</text>
</svg>
