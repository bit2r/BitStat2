<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="'ET Book','Palatino Linotype',Palatino,Georgia,'Times New Roman',serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#555" stroke-width="1"/></marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#9c2a10" stroke-width="1"/></marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6" fill="none" stroke="#3f6b3f" stroke-width="1"/></marker>
    <style>
      text{fill:#1a1a1a}
      .t{font-size:25px}.sub{font-size:13px;fill:#6b6b60;font-style:italic}
      .lab{font-size:12.5px;fill:#8a8578;font-style:italic;letter-spacing:.1em}
      .h{font-size:15px;fill:#141410}.b{font-size:12.5px;fill:#35352c}.s{font-size:11px;fill:#6b6b60}
      .v{font-size:14px;fill:#8a1500;font-weight:bold}
      .note{font-size:11.5px;fill:#9c2a10;font-style:italic}.ok{font-size:11.5px;fill:#3f6b3f;font-style:italic}
      .box{fill:#f5f3e6;stroke:#3a3a32;stroke-width:1}.box2{fill:#ffffff;stroke:#3a3a32;stroke-width:1}
      .bad{fill:#fbecea;stroke:#9c2a10;stroke-width:1.2}.good{fill:#eef3ea;stroke:#3f6b3f;stroke-width:1.2}
      .flow{stroke:#555;stroke-width:1.2;fill:none}.rule{stroke:#d8d4c2;stroke-width:1}
    </style>
  </defs>
  <rect x="0" y="0" width="1080" height="720" fill="#fffff8"/>
  <text class="t" x="40" y="46">webR 번들링 — 오진 정정과 해결</text>
  <text class="sub" x="430" y="46">"앱이 안 빨라진다"의 진짜 원인</text>
  <line class="rule" x1="40" y1="58" x2="1040" y2="58"/>

  <!-- 관찰 -->
  <text class="lab" x="40" y="86">1 · 관 찰</text>
  <rect class="box2" x="40" y="98" width="1000" height="40" rx="2"/>
  <text class="b" x="54" y="123">"WEBR STATUS = 🟢 Ready! 는 빠른데, 인터랙티브 앱 로딩은 별 차이가 없다." + 화면에 webR <tspan fill="#9c2a10">v0.3.3</tspan> 표시</text>

  <!-- 오진 -->
  <text class="lab" x="40" y="166">2 · 오 진 (되돌린 실수)</text>
  <rect class="bad" x="40" y="178" width="1000" height="58" rx="2"/>
  <text class="b" x="54" y="202">원격 다운로드(<tspan font-style="italic">repo.r-wasm.org/…/contrib/4.3.3</tspan>)와 v0.3.3을 <tspan fill="#9c2a10">앱 탓으로 오인</tspan> → "번들링 실패"로 판단하고</text>
  <text class="b" x="54" y="222">잘 되던 앱 자산 0.10.12를 <tspan fill="#9c2a10">성급히 0.2.3으로 되돌림</tspan>.</text>

  <!-- 실제 -->
  <text class="lab" x="40" y="264">3 · 실 제  (webR 인스턴스가 둘)</text>
  <rect class="box" x="40" y="276" width="490" height="96" rx="2"/>
  <text class="h" x="54" y="300">① 코드셀 coatless/webr</text>
  <text class="v" x="54" y="324" font-size="16">webR v0.3.3 (고정)</text>
  <text class="s" x="54" y="346">→ "WEBR STATUS"의 v0.3.3은 이것.</text>
  <text class="s" x="54" y="364">원격 contrib/4.3.3 다운로드도 <tspan fill="#9c2a10">대부분 여기</tspan>.</text>

  <rect class="good" x="550" y="276" width="490" height="96" rx="2"/>
  <text class="h" x="564" y="300">② shinylive 앱 (자산 0.10.12)</text>
  <text class="v" x="564" y="324" font-size="16" fill="#3f6b3f">webR 0.6.0 · 로컬 번들</text>
  <text class="s" x="564" y="346">→ 실제로는 <tspan fill="#3f6b3f">번들에서 로드돼 빨랐다</tspan>(clt ~18s).</text>
  <text class="s" x="564" y="364">즉 앱 번들링은 <tspan fill="#3f6b3f">성공했었다</tspan> — 되돌릴 필요 없었음.</text>

  <!-- 해결 -->
  <text class="lab" x="40" y="404">4 · 해 결  (둘 다 webR 0.6.0로 정렬)</text>
  <rect class="good" x="40" y="416" width="490" height="70" rx="2"/>
  <text class="h" x="54" y="440">① 코드셀 → webR</text>
  <text class="v" x="220" y="440" font-size="16" fill="#3f6b3f">0.3.3 → 0.6.0</text>
  <text class="s" x="54" y="462">webr.lua baseVersionWebR + worker/serviceworker</text>
  <text class="s" x="54" y="478">→ Ready! 정상, R 4.6 · .tgz·async</text>

  <rect class="good" x="550" y="416" width="490" height="70" rx="2"/>
  <text class="h" x="564" y="440">② 앱 자산 → shinylive</text>
  <text class="v" x="742" y="440" font-size="16" fill="#3f6b3f">0.2.3 → 0.10.12</text>
  <text class="s" x="564" y="462">_environment 재적용 (번들링)</text>
  <text class="s" x="564" y="478">→ 106패키지 로컬 번들, 앱 ~18–25s</text>

  <!-- 결과/교훈 -->
  <line class="rule" x1="40" y1="510" x2="1040" y2="510"/>
  <text class="h" x="40" y="536">결과: 앱은 번들로 빠르고(②), 코드셀은 최신 webR 0.6.0(①). 두 인스턴스가 R 4.6로 정렬.</text>

  <text class="lab" x="40" y="570">교 훈  →  GOTCHA.md</text>
  <text class="b" x="56" y="594">· 한 페이지에 webR가 <tspan font-style="italic">둘</tspan>(코드셀 vs 앱). "WEBR STATUS"는 코드셀이다 — <tspan fill="#9c2a10">절대 혼동 말 것</tspan>.</text>
  <text class="b" x="56" y="616">· 속도 진단은 iframe(앱) 요청과 코드셀 요청을 <tspan font-style="italic">분리 측정</tspan> 후에. 성급히 되돌리지 말 것.</text>
  <text class="b" x="56" y="638">· 검증은 <tspan font-style="italic">새 포트</tspan>로(서비스워커 캐시 회피). 렌더 전 <tspan font-style="italic">_freeze 삭제</tspan>(stale HTML 방지). iCloud는 비-iCloud 빌드.</text>

  <line class="rule" x1="40" y1="662" x2="1040" y2="662"/>
  <text class="ok" x="40" y="684">트레이드오프: 앱 번들로 docs 77M→173M. 더 빠르게: 의존성 슬림화 · coi-serviceworker(SAB) · webr.packages 정리.</text>
</svg>
